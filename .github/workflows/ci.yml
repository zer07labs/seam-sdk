name: ci

# The SDKs are generated from the *private* `seam.api.v1` contract on the BSR, so building/testing the
# transport-coupled client needs read access to it. Configure these repo secrets to enable CI:
#   * BUF_TOKEN          — a BSR token with read access to buf.build/zer07labs/seam (enables python + ts).
#   * RUNTIME_REPO_TOKEN — a PAT that can check out the private zer07labs/seam-runtime (enables the live
#                          integration job, which builds seam-grpc).
# Jobs that need a secret self-skip (not fail) when it is absent — so forks and the pre-secret state stay
# green instead of red.

on:
  push:
  pull_request:

jobs:
  preflight:
    name: preflight (secret gating)
    runs-on: ubuntu-latest
    outputs:
      have_buf_token: ${{ steps.check.outputs.have_buf_token }}
      can_integrate: ${{ steps.check.outputs.can_integrate }}
    steps:
      - id: check
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
          RUNTIME_REPO_TOKEN: ${{ secrets.RUNTIME_REPO_TOKEN }}
        run: |
          if [ -n "$BUF_TOKEN" ]; then
            echo "have_buf_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_buf_token=false" >> "$GITHUB_OUTPUT"
            echo "BUF_TOKEN not set — skipping the build/test jobs (cannot read the private contract)"
          fi
          if [ -n "$BUF_TOKEN" ] && [ -n "$RUNTIME_REPO_TOKEN" ]; then
            echo "can_integrate=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_integrate=false" >> "$GITHUB_OUTPUT"
          fi

  python:
    name: python (ruff · pytest)
    needs: preflight
    if: needs.preflight.outputs.have_buf_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: buf login
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: printf '%s' "$BUF_TOKEN" | buf registry login buf.build --token-stdin
      - name: generate the transport stubs from the contract
        run: buf generate buf.build/zer07labs/seam
      # The SDK's contract-freshness gate: assert the just-generated stubs carry the RPC the hand-written
      # clients call. Hard-fails on a stale BSR module (the SDK analogue of the runtime's published-surface
      # gate). Default mode (RPC only) — the streamed-payload fields are STREAM=1 and pend the Phase-0 push.
      - name: check-contract (RPC surface gate)
        run: make check-contract
      - name: install (package + dev tools)
        run: pip install -e "./python[dev]"
      - name: ruff (lint + format)
        run: |
          ruff check python
          ruff format --check python
      # Unit + cross-language conformance vectors. The live integration test self-skips (no SEAM_GRPC_BIN).
      - name: pytest
        working-directory: python
        run: pytest -q

  typescript:
    name: typescript (typecheck · build · test)
    needs: preflight
    if: needs.preflight.outputs.have_buf_token == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: buf login
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: printf '%s' "$BUF_TOKEN" | buf registry login buf.build --token-stdin
      - name: generate the transport stubs from the contract
        run: buf generate buf.build/zer07labs/seam
      - name: install
        working-directory: ts
        run: npm ci
      - name: typecheck
        working-directory: ts
        run: npm run typecheck
      - name: build (emit JS + d.ts)
        working-directory: ts
        run: npm run build
      # Conformance vectors. The live integration test self-skips (no SEAM_GRPC_BIN / SEAM_GRPC_ADDR).
      - name: test
        working-directory: ts
        run: npm test

  integration:
    name: integration (live seam-grpc round-trip)
    needs: preflight
    if: needs.preflight.outputs.can_integrate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check out the runtime (private) to build seam-grpc
        uses: actions/checkout@v4
        with:
          repository: zer07labs/seam-runtime
          token: ${{ secrets.RUNTIME_REPO_TOKEN }}
          path: _runtime
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: build seam-grpc
        run: cargo build --manifest-path _runtime/Cargo.toml -p seamd --bin seam-grpc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}
      - name: buf login
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: printf '%s' "$BUF_TOKEN" | buf registry login buf.build --token-stdin
      - name: generate the transport stubs from the contract
        run: buf generate buf.build/zer07labs/seam
      # Live data-plane round-trip + the management-plane (SeamAdmin) erasure/auth suite. Both spawn the
      # seam-grpc binary themselves; test_admin.py boots the second (SEAM_GRPC_MGMT_LISTEN) listener.
      - name: python live round-trip + management plane
        working-directory: python
        env:
          SEAM_GRPC_BIN: ${{ github.workspace }}/_runtime/target/debug/seam-grpc
        run: |
          pip install -e ".[dev]"
          pytest -q tests/test_integration.py tests/test_admin.py
      - name: typescript live round-trip
        working-directory: ts
        env:
          SEAM_GRPC_BIN: ${{ github.workspace }}/_runtime/target/debug/seam-grpc
        run: |
          npm ci
          npm test

  # The Go/Java/Kotlin crypto shims are standalone (no generated transport) — they need no BUF_TOKEN and
  # run unconditionally, verifying byte-for-byte reproduction of conformance/vectors.json.
  go:
    name: go (test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: go test
        working-directory: go
        run: go test ./...

  java:
    name: java (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: gradle test
        working-directory: java
        run: gradle test --no-daemon

  kotlin:
    name: kotlin (gradle test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: gradle test
        working-directory: kotlin
        run: gradle test --no-daemon

  verify:
    name: verify (the independent verifier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # THE claim, asserted. `verify/` exists to check Seam's audit chain WITHOUT trusting Seam, and the
      # only thing that makes that true is its dependency list. A verifier that links Seam's own store is
      # Seam checking Seam — which is precisely what "don't trust us, verify it yourself" says you should
      # not have to accept.
      #
      # So this is a gate, not a comment. If a Seam crate ever appears in the tree, the claim has quietly
      # stopped being true and the build says so.
      - name: the verifier must link NOTHING of Seam's
        run: |
          cd verify
          TREE=$(cargo tree -e normal)
          echo "$TREE"
          if echo "$TREE" | grep -vE '^seam-verify ' | grep -qiE '\bseam-(store|types|traits|trust|kernel|crypto|api|client|guard|coord|context|bandit)'; then
            echo "::error::seam-verify links a Seam crate. The independence claim is now false — that is the whole product."
            exit 1
          fi
          echo "OK — zero Seam crates."

      - name: fmt
        run: cd verify && cargo fmt --check
      - name: clippy
        run: cd verify && cargo clippy --all-targets -- -D warnings
      - name: test
        run: cd verify && cargo test
      # The published reference vector must verify with the shipped binary — from the issuer AID alone.
      # If this ever fails, we are shipping a fixture that does not verify, which is worse than shipping none.
      - name: the published reference vector verifies
        run: |
          cd verify
          AID=$(python3 -c "import json;print(json.load(open('fixtures/erasure_certificate_vector.json'))['issuer_aid'])")
          cargo run --quiet -- erasure-cert fixtures/erasure_certificate_vector.json --issuer "$AID"
