# Generate the Seam client SDKs for every target language from the seam.api.v1 contract.
#
# Input is the published BSR module `buf.build/zer07labs/seam` (or a local seam-runtime checkout — see the
# Makefile). Remote plugins run codegen on the BSR, so no local protoc-gen-* toolchains are needed; they
# do require a one-time `buf registry login`.
version: v2
managed:
  enabled: true
  override:
    # Go needs an import path; set it here (managed mode) so the proto stays language-neutral.
    - file_option: go_package_prefix
      value: github.com/zer07labs/seam-sdk/gen/go
    - file_option: java_multiple_files
      value: true
    - file_option: java_package_prefix
      value: com.zer07labs
plugins:
  # ── Go (messages + grpc-go) ──
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: gen/go
    opt: paths=source_relative

  # ── Python (messages + type stubs + grpc) ──
  #    Generated *inside* the package (`seam_sdk/_gen`) so the built wheel ships the transport and
  #    `import seam_sdk` resolves it once installed — not into a sibling `gen/` outside the package.
  - remote: buf.build/protocolbuffers/python
    out: python/seam_sdk/_gen
  - remote: buf.build/protocolbuffers/pyi
    out: python/seam_sdk/_gen
  - remote: buf.build/grpc/python
    out: python/seam_sdk/_gen

  # ── TypeScript (protobuf-es v2 — emits the service descriptors too; used with @connectrpc/connect v2).
  #    Generated into the ts package so it resolves the package's node_modules. ──
  - remote: buf.build/bufbuild/es
    out: ts/gen
    opt:
      - target=ts
      # seam.api.v1 now imports seam.event.v1 across files; nodenext moduleResolution needs the explicit
      # `.js` extension on the generated cross-file imports (a single-file contract never emitted any).
      - import_extension=js

  # ── Java (messages + grpc-java) ──
  - remote: buf.build/protocolbuffers/java
    out: gen/java
  - remote: buf.build/grpc/java
    out: gen/java

  # ── Kotlin (messages + grpc-kotlin) ──
  - remote: buf.build/protocolbuffers/kotlin
    out: gen/kotlin
  - remote: buf.build/grpc/kotlin
    out: gen/kotlin
